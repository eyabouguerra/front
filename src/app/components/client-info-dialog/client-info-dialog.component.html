<!-- Modal for client info -->
<div class="modal" tabindex="-1" [ngClass]="{'show': showOrderModal}" [ngStyle]="{'display': showOrderModal ? 'block' : 'none'}">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Informations du client</h5>
        <button type="button" class="btn-close" (click)="closeOrderModal()"></button>
      </div>
      <div class="modal-body">
        <form #orderForm="ngForm" (ngSubmit)="onSubmit(orderForm)">
          <div class="form-group mb-3">
            <label for="fullName" class="form-label">Nom complet</label>
            <input type="text" id="fullName" class="form-control" 
                  [(ngModel)]="data.fullName" name="fullName" required>
          </div>
          <div class="form-group mb-3">
            <label for="fullAddress" class="form-label">Adresse de livraison</label>
            <input type="text" id="fullAddress" class="form-control" 
                  [(ngModel)]="data.fullAddress" name="fullAddress" required>
          </div>
          <div class="form-group mb-3">
            <label for="contactNumber" class="form-label">Numéro de téléphone</label>
            <input type="text" id="contactNumber" class="form-control" 
                  [(ngModel)]="data.contactNumber" name="contactNumber" required>
          </div>
          <div class="form-group mb-3">
            <label for="alternateContactNumber" class="form-label">Autre numéro de téléphone (optionnel)</label>
            <input type="text" id="alternateContactNumber" class="form-control" 
                  [(ngModel)]="data.alternateContactNumber" name="alternateContactNumber">
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" (click)="closeOrderModal()">Annuler</button>
            <button type="submit" class="btn btn-primary" [disabled]="!orderForm.form.valid">Passer la commande</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
